# SSO session definitions for rebuildAwsCliConfig.
# Format: "profile-name|sso-start-url|region|scopes"
SSOPROFILES=(
    "main|https://example.com/start|us-east-1|sso:account:access"
)

# Profile definitions for rebuildAwsCliConfig.
# Format: "alias|sso-session|account-id|role-name|region|login-type"
# login-type must match a _aws_login_<type> function in aws_functions.sh.
PROFILES=(
    "devprofile|main|012345678910|MyRole|us-east-1|sso"
)

OPERATING_REGIONS=(
    "us-east-1"
    "us-east-2"
)
